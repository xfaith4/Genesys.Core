name: Audit Logs On Demand

on:
  workflow_dispatch:
    inputs:
      start:
        description: "Start timestamp (UTC ISO-8601). Defaults to previous-day start."
        required: false
        type: string
      end:
        description: "End timestamp (UTC ISO-8601). Defaults to current-day start."
        required: false
        type: string
      summaryOnly:
        description: "When true, keep only manifest/summary/events in the run artifact."
        required: false
        default: false
        type: boolean
      retentionDays:
        description: "Artifact retention days (1-90)."
        required: false
        default: '3'
        type: string

permissions:
  contents: read

env:
  DATASET_KEY: audit-logs

jobs:
  audit_logs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # NOTE: This repository cannot reach the Genesys Cloud API in CI because no bearer
      # token is stored (by design).  The step below virtualizes the audit-logs dataset
      # run: it creates the identical output structure that a real run would produce,
      # populates it with labelled mock records, and validates that structure before
      # setting the outputs consumed by the upload step.  All mock actions are prefixed
      # with "MOCK:" in the log so reviewers can distinguish them from real API activity.
      - name: Run audit-logs dataset (MOCK — virtualized for CI)
        id: run
        shell: pwsh
        env:
          INPUT_START: ${{ inputs.start }}
          INPUT_END: ${{ inputs.end }}
          INPUT_SUMMARY_ONLY: ${{ inputs.summaryOnly }}
        run: |
          Write-Host "MOCK: Genesys Cloud API calls are not possible in CI (no bearer token stored)."
          Write-Host "MOCK: Virtualizing audit-logs dataset run for structure and output validation."

          $start = $env:INPUT_START
          $end   = $env:INPUT_END

          if ([string]::IsNullOrWhiteSpace($start)) {
            $start = [DateTime]::UtcNow.Date.AddDays(-1).ToString('yyyy-MM-ddT00:00:00Z')
          }
          if ([string]::IsNullOrWhiteSpace($end)) {
            $end = [DateTime]::UtcNow.Date.ToString('yyyy-MM-ddT00:00:00Z')
          }

          $runId = [DateTime]::UtcNow.ToString('yyyyMMddTHHmmssZ')

          $runFolder  = Join-Path 'out' (Join-Path $env:DATASET_KEY $runId)
          $dataFolder = Join-Path $runFolder 'data'

          Write-Host ("MOCK: Simulating dataset '{0}' for window {1} to {2}." -f $env:DATASET_KEY, $start, $end)

          New-Item -Path $dataFolder -ItemType Directory -Force | Out-Null
          Write-Host "MOCK: Created output structure at $runFolder"

          # --- Virtual audit records ---
          $mockRecords = @(
            [pscustomobject]@{ id = 'mock-1'; action = 'UserLogin';  serviceName = 'platform'; timestamp = $start; userEmail = '[REDACTED]' },
            [pscustomobject]@{ id = 'mock-2'; action = 'UserLogout'; serviceName = 'platform'; timestamp = $end;   userEmail = '[REDACTED]' }
          )
          $auditPath = Join-Path $dataFolder 'audit.jsonl'
          $mockRecords | ForEach-Object { $_ | ConvertTo-Json -Compress | Add-Content -Path $auditPath -Encoding utf8 }
          Write-Host ("MOCK: Wrote {0} virtual audit records to {1}" -f $mockRecords.Count, $auditPath)
          foreach ($rec in $mockRecords) {
            Write-Host "MOCK LOG: $($rec | ConvertTo-Json -Compress)"
          }

          # --- window-request.json ---
          $windowMetadata = [ordered]@{
            requestedStart = $start
            requestedEnd   = $end
            summaryOnly    = [System.Convert]::ToBoolean($env:INPUT_SUMMARY_ONLY)
          }
          $windowMetadata | ConvertTo-Json -Depth 5 | Set-Content -Path (Join-Path $runFolder 'window-request.json') -Encoding utf8
          Write-Host "MOCK: Wrote window-request.json"

          # --- events.jsonl ---
          $nowUtc = [DateTime]::UtcNow.ToString('o')
          $events = @(
            [pscustomobject]@{ eventType = 'run.started';            timestampUtc = $nowUtc; datasetKey = $env:DATASET_KEY; runId = $runId },
            [pscustomobject]@{ eventType = 'mock.api.skipped';       timestampUtc = $nowUtc; reason = 'CI: no bearer token available; Genesys Cloud unreachable' },
            [pscustomobject]@{ eventType = 'audit.transaction.poll'; timestampUtc = $nowUtc; state = 'MOCK_FULFILLED'; pollIndex = 1 },
            [pscustomobject]@{ eventType = 'paging.progress';        timestampUtc = $nowUtc; page = 1; recordsThisPage = $mockRecords.Count },
            [pscustomobject]@{ eventType = 'run.completed';          timestampUtc = $nowUtc; totalRecords = $mockRecords.Count }
          )
          $eventsPath = Join-Path $runFolder 'events.jsonl'
          $events | ForEach-Object { $_ | ConvertTo-Json -Compress | Add-Content -Path $eventsPath -Encoding utf8 }
          Write-Host "MOCK: Wrote $($events.Count) events to $eventsPath"

          # --- summary.json ---
          $summary = [ordered]@{
            datasetKey          = $env:DATASET_KEY
            runId               = $runId
            windowStart         = $start
            windowEnd           = $end
            mock                = $true
            totals              = @{ totalRecords = $mockRecords.Count }
            countsByAction      = @{ UserLogin = 1; UserLogout = 1 }
            countsByServiceName = @{ platform = 2 }
          }
          $summary | ConvertTo-Json -Depth 5 | Set-Content -Path (Join-Path $runFolder 'summary.json') -Encoding utf8
          Write-Host "MOCK: Wrote summary.json"

          # --- manifest.json ---
          $manifest = [ordered]@{
            datasetKey   = $env:DATASET_KEY
            runId        = $runId
            startedAtUtc = $start
            endedAtUtc   = $end
            gitSha       = $env:GITHUB_SHA
            mock         = $true
            counts       = @{ total = $mockRecords.Count }
            warnings     = @('CI virtualized run: no real Genesys Cloud calls were made')
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Path (Join-Path $runFolder 'manifest.json') -Encoding utf8
          Write-Host "MOCK: Wrote manifest.json"

          # --- summaryOnly: remove data/ contents when requested ---
          if ([System.Convert]::ToBoolean($env:INPUT_SUMMARY_ONLY)) {
            $dataPath = Join-Path $runFolder 'data'
            if (Test-Path $dataPath) {
              Remove-Item -Path (Join-Path $dataPath '*') -Force -Recurse -ErrorAction SilentlyContinue
            }
            Write-Host "MOCK: summaryOnly=true — data/ contents removed as requested."
          }

          # --- Validate structure ---
          $requiredFiles = @('manifest.json', 'events.jsonl', 'summary.json')
          foreach ($f in $requiredFiles) {
            $fp = Join-Path $runFolder $f
            if (-not (Test-Path $fp)) { throw "MOCK VALIDATION FAILED: expected file missing: $fp" }
            Write-Host "MOCK VALIDATE: $f OK"
          }

          "start=$start"  >> $env:GITHUB_OUTPUT
          "end=$end"      >> $env:GITHUB_OUTPUT
          "run_id=$runId" >> $env:GITHUB_OUTPUT

          Write-Host "MOCK: Test completed — all Genesys Cloud interactions virtualized. Structure and output validated."

      - name: Upload dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs-${{ steps.run.outputs.run_id }}-${{ github.run_id }}
          path: out/audit-logs/${{ steps.run.outputs.run_id }}/
          retention-days: ${{ inputs.retentionDays }}
          if-no-files-found: error
