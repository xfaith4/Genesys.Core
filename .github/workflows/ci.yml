name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  pester:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester (no NuGet provider)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          if (-not (Get-Module -ListAvailable -Name PSResourceGet)) {
            Install-Module -Name PSResourceGet -Scope CurrentUser -Force -AllowClobber -SkipPublisherCheck
          }

          Import-Module PSResourceGet -Force
          Install-PSResource -Name Pester -Scope CurrentUser -TrustRepository -Reinstall

          Import-Module Pester -Force
          Get-Module Pester | Format-List Name,Version,Path

      - name: Run Pester
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $config = . ./tests/PesterConfiguration.ps1
          Invoke-Pester -Configuration $config
