name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  pester:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester (no NuGet provider)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          # Ensure PowerShellGet is available and modern enough
          Install-Module PowerShellGet -Scope CurrentUser -Force -AllowClobber -SkipPublisherCheck

          # Install Pester
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -AllowClobber

          Import-Module Pester -Force
          Get-Module Pester | Format-List Name,Version,Path

      - name: Run Pester
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $config = . ./tests/PesterConfiguration.ps1
          Invoke-Pester -Configuration $config
