name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  pester:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # PowerShell (pwsh) is already available on ubuntu-latest runners. :contentReference[oaicite:1]{index=1}
      - name: Show PowerShell version
        shell: pwsh
        run: |
          $PSVersionTable

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-PackageProvider -Name NuGet -Force -Scope CurrentUser | Out-Null

          # Install a modern Pester (v5+) deterministically
          Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck

          Import-Module Pester -Force
          Get-Module Pester | Format-List Name,Version,Path

      - name: Run Pester
        shell: pwsh
        run: |
          $config = . ./tests/PesterConfiguration.ps1
          Invoke-Pester -Configuration $config
