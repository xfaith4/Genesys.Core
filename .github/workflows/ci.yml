name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  pester:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show PowerShell info
        shell: pwsh
        run: |
          $PSVersionTable
          Get-Command pwsh | Format-List *

      - name: Install Pester (robust)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          # Trust PSGallery to avoid prompts
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          # Prefer PSResourceGet (modern). If missing, install it using PowerShellGet.
          if (-not (Get-Module -ListAvailable -Name PSResourceGet)) {
            # PowerShellGet is commonly present; this avoids the NuGet provider path.
            Install-Module -Name PSResourceGet -Scope CurrentUser -Force -AllowClobber -SkipPublisherCheck
          }

          Import-Module PSResourceGet -Force

          # Install Pester v5+ deterministically
          Install-PSResource -Name Pester -Scope CurrentUser -TrustRepository -Reinstall

          Import-Module Pester -Force
          Get-Module Pester | Format-List Name,Version,Path

      - name: Run Pester
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $config = . ./tests/PesterConfiguration.ps1
          Invoke-Pester -Configuration $config
